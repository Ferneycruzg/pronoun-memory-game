<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronoun Memory Game</title>

<p>
Made by: Ferney Cruz Grisales 
</p>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)),
    url('https://www.transparenttextures.com/patterns/checkered-pattern.png');

    background-color:#cfe8ff;

    min-height:100vh;

    padding:30px;

    text-align:center;

}

h1{

    font-size:3rem;
    color:#222;
    margin-bottom:10px;

}

.subtitle{

    margin-bottom:20px;
    color:#444;

}

.players{

    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:20px;
    flex-wrap:wrap;

}

.player-card{

    background:white;
    padding:18px 25px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    min-width:220px;
    transition:0.3s;

}

.active-player{

    border:4px solid #2563eb;
    transform:scale(1.05);

}

.score{

    font-size:2rem;
    margin-top:10px;
    font-weight:bold;

}

.turn{

    margin-top:10px;
    color:#2563eb;
    font-weight:bold;

}

.legend{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;

}

.legend div{

    padding:10px 18px;
    border-radius:12px;
    color:white;
    font-weight:bold;

}

.personal-legend{
    background:#2563eb;
}

.possessive-legend{
    background:#16a34a;
}

.object-legend{
    background:#ea580c;
}

.wild-legend{
    background:#dc2626;
}

#message{

    height:40px;
    font-size:1.8rem;
    font-weight:bold;
    margin-bottom:20px;

}

.game-board{

    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:18px;

    max-width:1200px;
    margin:auto;

    perspective:1000px;

}

.card{

    width:100%;
    height:170px;

    position:relative;

    transform-style:preserve-3d;

    transition:transform 0.7s;

    cursor:pointer;

}

.card.flip{

    transform:rotateY(180deg);

}

.card-face{

    position:absolute;

    width:100%;
    height:100%;

    border-radius:20px;

    backface-visibility:hidden;

    display:flex;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:15px;

    font-weight:bold;

    box-shadow:
    0 8px 15px rgba(0,0,0,0.15);

}

.front{

    background:white;

    border:4px dashed #555;

    font-size:2.2rem;

    color:#555;

}

.back{

    transform:rotateY(180deg);

    color:white;

    font-size:1rem;

}

.personal{
    background:linear-gradient(135deg,#60a5fa,#2563eb);
}

.possessive{
    background:linear-gradient(135deg,#4ade80,#16a34a);
}

.object{
    background:linear-gradient(135deg,#fb923c,#ea580c);
}

.wild{
    background:linear-gradient(135deg,#f87171,#dc2626);
}

.card.matched{

    cursor:default;
    pointer-events:none;

}

.matched .back{

    animation:glow 1s infinite alternate;

}

@keyframes glow{

    from{
        box-shadow:0 0 10px rgba(255,255,255,0.3);
    }

    to{
        box-shadow:0 0 25px rgba(255,255,255,0.9);
    }

}

.rules{

    max-width:900px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:left;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

.examples{

    max-width:900px;
    margin:30px auto;
    display:grid;
    gap:20px;

}

.example-card{

    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

@media(max-width:900px){

    .game-board{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>

<body>

<h1>🌟 Pronoun Memory Game 🌟</h1>

<p class="subtitle">
Match the sentence with the correct pronoun!
</p>

<div class="players">

    <div class="player-card active-player" id="player1Card">
        <h2>👦 Player 1</h2>
        <div class="score" id="score1">0</div>
    </div>

    <div class="player-card" id="player2Card">
        <h2>👧 Player 2</h2>
        <div class="score" id="score2">0</div>
    </div>

</div>

<div class="turn" id="turnDisplay">
Player 1's Turn
</div>

<br>

<div class="legend">

    <div class="personal-legend">🔵 Personal</div>
    <div class="possessive-legend">🟢 Possessive</div>
    <div class="object-legend">🟠 Object</div>
    <div class="wild-legend">🔴 Wild Cards</div>

</div>

<div id="message"></div>

<div class="game-board" id="board"></div>

<script>

const cardsData = [

{ text:"I am happy because I passed the exam.", pair:"I", type:"personal"},
{ text:"I", pair:"I", type:"personal"},

{ text:"Can you help me with my homework?", pair:"Me", type:"object"},
{ text:"Me", pair:"Me", type:"object"},

{ text:"He plays soccer every weekend.", pair:"He", type:"personal"},
{ text:"He", pair:"He", type:"personal"},

{ text:"This notebook is mine.", pair:"Mine", type:"possessive"},
{ text:"Mine", pair:"Mine", type:"possessive"},

{ text:"She is talking to her best friend.", pair:"She", type:"personal"},
{ text:"She", pair:"She", type:"personal"},

{ text:"My brother loves her very much.", pair:"Her", type:"object"},
{ text:"Her", pair:"Her", type:"object"},

{ text:"We study English after school.", pair:"We", type:"personal"},
{ text:"We", pair:"We", type:"personal"},

{ text:"The blue backpack is yours.", pair:"Yours", type:"possessive"},
{ text:"Yours", pair:"Yours", type:"possessive"},

{ text:"Our teacher gave us extra activities.", pair:"Us", type:"object"},
{ text:"Us", pair:"Us", type:"object"},

{ text:"That classroom is ours.", pair:"Ours", type:"possessive"},
{ text:"Ours", pair:"Ours", type:"possessive"},

{ text:"🎲 EXTRA TURN!", pair:"wild1", type:"wild"},
{ text:"❌ LOSE A PAIR!", pair:"wild2", type:"wild"}

];

cardsData.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");

let firstCard = null;
let secondCard = null;
let lockBoard = false;

let currentPlayer = 1;

let score1 = 0;
let score2 = 0;

function updateTurnUI(){

    document.getElementById("turnDisplay").innerHTML =
    `Player ${currentPlayer}'s Turn`;

    document.getElementById("player1Card")
    .classList.toggle("active-player", currentPlayer === 1);

    document.getElementById("player2Card")
    .classList.toggle("active-player", currentPlayer === 2);

}

cardsData.forEach(cardData=>{

    const card = document.createElement("div");

    card.classList.add("card");

    card.dataset.pair = cardData.pair;
    card.dataset.type = cardData.type;

    card.innerHTML = `

    <div class="card-face front">
        ❓
    </div>

    <div class="card-face back ${cardData.type}">
        ${cardData.text}
    </div>

    `;

    card.addEventListener("click", ()=>flipCard(card));

    board.appendChild(card);

});

function flipCard(card){

    if(lockBoard) return;

    if(card === firstCard) return;

    if(card.classList.contains("matched")) return;

    card.classList.add("flip");

    // WILD CARDS

    if(card.dataset.type === "wild"){

        const message = document.getElementById("message");

        card.classList.add("matched");

        // EXTRA TURN

        if(card.dataset.pair === "wild1"){

            message.innerHTML = "🎲 EXTRA TURN!";
            message.style.color = "#2563eb";

        }

        // LOSE A PAIR

        else{

            message.innerHTML = "❌ LOSE A PAIR!";
            message.style.color = "#dc2626";

            removePlayerPair();

        }

        setTimeout(()=>{

            message.innerHTML = "";

        },1500);

        return;
    }

    if(!firstCard){

        firstCard = card;
        return;

    }

    secondCard = card;

    lockBoard = true;

    checkMatch();

}

function checkMatch(){

    const message = document.getElementById("message");

    // CORRECT MATCH

    if(firstCard.dataset.pair === secondCard.dataset.pair){

        message.innerHTML = "✅ MATCH!";
        message.style.color = "#16a34a";

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        // SCORE

        if(currentPlayer === 1){

            score1++;
            document.getElementById("score1").innerHTML = score1;

        }else{

            score2++;
            document.getElementById("score2").innerHTML = score2;

        }

        // SAME PLAYER CONTINUES

        resetTurn();

    }

    // WRONG MATCH

    else{

        message.innerHTML = "❌ TRY AGAIN!";
        message.style.color = "#dc2626";

        setTimeout(()=>{

            firstCard.classList.remove("flip");
            secondCard.classList.remove("flip");

            resetTurn();

            // CHANGE TURN ONLY HERE

            switchPlayer();

        },1200);

    }

}

function switchPlayer(){

    currentPlayer = currentPlayer === 1 ? 2 : 1;

    updateTurnUI();

}

function removePlayerPair(){

    let matchedPairs = {};

    const matchedCards =
    document.querySelectorAll(".card.matched");

    matchedCards.forEach(card=>{

        const pair = card.dataset.pair;

        if(pair !== "wild1" && pair !== "wild2"){

            if(!matchedPairs[pair]){

                matchedPairs[pair] = [];

            }

            matchedPairs[pair].push(card);

        }

    });

    const pairsArray = Object.keys(matchedPairs);

    if(pairsArray.length === 0) return;

    const randomPair =
    pairsArray[Math.floor(Math.random()*pairsArray.length)];

    matchedPairs[randomPair].forEach(card=>{

        card.classList.remove("matched");

        setTimeout(()=>{

            card.classList.remove("flip");

        },500);

    });

    // REMOVE SCORE

    if(currentPlayer === 1 && score1 > 0){

        score1--;
        document.getElementById("score1").innerHTML = score1;

    }

    else if(currentPlayer === 2 && score2 > 0){

        score2--;
        document.getElementById("score2").innerHTML = score2;

    }

}

function resetTurn(){

    firstCard = null;
    secondCard = null;
    lockBoard = false;

}

updateTurnUI();

</script>

</body>
</html>
